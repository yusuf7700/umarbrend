<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mahsulot | Umar Brend</title>

    <meta name="description" content="Umar Brend — erkaklar va ayollar uchun premium, original oyoq kiyimlar.">

    <link rel="icon" type="image/jpeg" href="assets/logo/logo.jpg">
    <link rel="apple-touch-icon" href="assets/logo/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#C9A227">

    <meta property="og:title" content="Umar Brend | Premium Oyoq Kiyimlar">
    <meta property="og:description" content="Erkaklar va ayollar uchun zamonaviy, sifatli va original oyoq kiyimlar.">
    <meta property="og:image" content="https://umarbrend.vercel.app/assets/logo/logo.jpg">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body data-page="mahsulot">

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="container">

            <a href="index.html" class="logo">
                <img src="assets/logo/logo.jpg" alt="Umar Brend">
            </a>

            <nav class="navbar">
                <a href="index.html">Bosh sahifa</a>
                <a href="mahsulotlar.html?category=erkak">Erkaklar</a>
                <a href="mahsulotlar.html?category=ayol">Ayollar</a>
            </nav>

            <div class="header-icons">

                <button class="menu-btn" id="menuBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>

                <button class="icon-btn" id="searchBtn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

                <a class="icon-btn" href="sevimlilar.html" style="position:relative;">
                    <i class="fa-regular fa-heart"></i>
                    <span class="count-badge" id="favCount">0</span>
                </a>

                <button class="icon-btn" id="cartBtn" style="position:relative;">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="count-badge" id="cartCount">0</span>
                </button>

                <button class="icon-btn" id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>

            </div>

        </div>

    </header>

    <!-- ================= PRODUCT DETAIL ================= -->

    <section class="product-detail">

        <div class="container">

            <div class="detail-grid" id="detailRoot">
                <!-- JS orqali to'ldiriladi -->
            </div>

            <div class="reviews-section" id="reviewsSection" style="display:none;">

                <div class="reviews-summary">
                    <h2>Mijoz sharhlari</h2>
                    <div class="rating-overview">
                        <span class="rating-number" id="ratingAverage">0.0</span>
                        <div>
                            <div class="rating-stars" id="ratingStars"></div>
                            <span class="rating-count" id="ratingCount">0 ta sharh</span>
                        </div>
                    </div>
                </div>

                <div class="review-form-box">

                    <h3>Sharh qoldiring</h3>

                    <form id="reviewForm">

                        <input type="text" id="rv_name" placeholder="Ismingiz" required>

                        <div class="star-picker" id="starPicker">
                            <i class="fa-regular fa-star" data-value="1"></i>
                            <i class="fa-regular fa-star" data-value="2"></i>
                            <i class="fa-regular fa-star" data-value="3"></i>
                            <i class="fa-regular fa-star" data-value="4"></i>
                            <i class="fa-regular fa-star" data-value="5"></i>
                        </div>

                        <textarea id="rv_comment" rows="3" placeholder="Fikringizni yozing..." required></textarea>

                        <button type="submit" class="btn btn-gold">Yuborish</button>

                        <p id="reviewMsg" class="settings-msg"></p>

                    </form>

                </div>

                <div class="reviews-list" id="reviewsList"></div>

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="footer">

        <div class="container">

            <img src="assets/logo/logo.jpg" alt="Umar Brend">

            <p>© 2026 Umar Brend. Barcha huquqlar himoyalangan.</p>

            <div class="footer-address" id="footerAddress" style="display:none;">
                <i class="fa-solid fa-location-dot"></i>
                <span id="footerAddressText"></span>
            </div>

            <div class="footer-links">
                <a href="tel:+998901234567" id="footerPhoneLink"><i class="fa-solid fa-phone"></i> <span id="footerPhoneText">+998 90 123 45 67</span></a>
                <a href="https://t.me/umarbrend" target="_blank" id="footerTelegramLink"><i class="fa-brands fa-telegram"></i> Telegram</a>
                <a href="https://instagram.com/umarbrend" target="_blank" id="footerInstagramLink"><i class="fa-brands fa-instagram"></i> Instagram</a>
                <a href="#" id="footerVideoLink" target="_blank" rel="noopener" style="display:none;">
                    <i class="fa-solid fa-location-arrow"></i> Manzil videosi
                </a>
            </div>

        </div>

    </footer>

    <!-- SEARCH MODAL -->

    <div class="search-modal" id="searchModal">
        <div class="search-box">
            <div class="search-input-row">
                <input type="text" id="searchInput" placeholder="Mahsulot qidirish...">
                <button id="closeSearch"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>

    <script>

        document.addEventListener("productsReady", () => {

            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const product = getProductById(id);
            const root = document.getElementById("detailRoot");

            if (!product) {

                root.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <h3>Mahsulot topilmadi</h3>
                        <p><a href="index.html" style="color:var(--gold);font-weight:600;">Bosh sahifaga qaytish</a></p>
                    </div>
                `;

                return;

            }

            incrementProductViews(product);

            let selectedSize = product.sizes[0];
            let qty = 1;

            const hasColors = product.colors && product.colors.length > 0;
            let selectedColorIndex = 0;

            function currentColor() {
                return hasColors ? product.colors[selectedColorIndex] : null;
            }

            function currentImages() {
                const color = currentColor();
                return (color && color.images && color.images.length) ? color.images : product.images;
            }

            function currentStock() {
                const color = currentColor();
                return color ? color.stock : product.stock;
            }

            function colorsHtml() {

                if (!hasColors) return "";

                return `
                    <span class="size-label">Rang: <span id="selectedColorName">${product.colors[selectedColorIndex].name}</span></span>
                    <div class="color-grid" id="colorGrid">
                        ${product.colors.map((c, i) => `
                            <button type="button"
                                class="color-swatch ${i === selectedColorIndex ? "active" : ""}"
                                style="background:${c.hex || "#ccc"};"
                                data-index="${i}"
                                title="${c.name}">
                            </button>
                        `).join("")}
                    </div>
                `;

            }

            function oldPriceHtml() {

                return product.oldPrice
                    ? `<span class="detail-old-price">${product.oldPrice.toLocaleString()} so'm</span>`
                    : "";

            }

            function sizesHtml() {

                return product.sizes.map(size => `
                    <button class="size-btn ${size === selectedSize ? "active" : ""}" data-size="${size}">
                        ${size}
                    </button>
                `).join("");

            }

            function thumbsHtml() {

                return currentImages().map((img, i) => `
                    <div class="detail-thumb ${i === 0 ? "active" : ""}" data-img="${img}">
                        <img src="${img}" alt="${product.name} ${i + 1}">
                    </div>
                `).join("");

            }

            function render() {

                root.innerHTML = `

                    <div class="detail-gallery">
                        <div class="detail-gallery-main">
                            <img id="mainImage" src="${currentImages()[0]}" alt="${product.name}">
                        </div>
                        <div class="detail-thumbs">${thumbsHtml()}</div>
                    </div>

                    <div class="detail-info">

                        <span class="detail-badge">${product.badge}</span>

                        <h1>${product.name}</h1>

                        <div>
                            <span class="detail-price">${product.price.toLocaleString()} so'm</span>
                            ${oldPriceHtml()}
                        </div>

                        ${colorsHtml()}

                        <div class="detail-stock">🟢 Qolgan: ${currentStock()} ta</div>

                        <p class="detail-desc">${product.description}</p>

                        <span class="size-label">Razmer tanlang</span>
                        <div class="size-grid" id="sizeGrid">${sizesHtml()}</div>

                        <span class="qty-label">Miqdor</span>
                        <div class="detail-qty">
                            <div class="qty-control">
                                <button id="qtyMinus">-</button>
                                <span id="qtyValue">${qty}</span>
                                <button id="qtyPlus">+</button>
                            </div>
                        </div>

                        <div class="detail-actions">

                            <button class="like-btn detail-like" data-id="${product.id}">
                                <i class="fa-regular fa-heart"></i>
                            </button>

                            <button class="btn btn-outline" id="addToCartBtn">
                                <i class="fa-solid fa-cart-plus"></i> Savatchaga qo'shish
                            </button>

                            <button class="btn btn-gold" id="orderNowBtn">
                                🛍 Buyurtma berish
                            </button>

                        </div>

                    </div>

                `;

                bindEvents();

                // like-btn ni product-card kabi ko'rsatish uchun mock-data-id ota elementga qo'yildi
                document.querySelector(".detail-like").closest(".detail-info").dataset.id = product.id;
                initFavorites(document.querySelector(".detail-actions").parentElement);

            }

            function bindEvents() {

                document.getElementById("mainImage") &&
                document.querySelectorAll(".detail-thumb").forEach(thumb => {

                    thumb.addEventListener("click", () => {
                        document.getElementById("mainImage").src = thumb.dataset.img;
                        document.querySelectorAll(".detail-thumb").forEach(t => t.classList.remove("active"));
                        thumb.classList.add("active");
                    });

                });

                document.querySelectorAll(".color-swatch").forEach(btn => {

                    btn.addEventListener("click", () => {
                        selectedColorIndex = Number(btn.dataset.index);
                        qty = 1;
                        render();
                    });

                });

                document.querySelectorAll(".size-btn").forEach(btn => {

                    btn.addEventListener("click", () => {
                        selectedSize = Number(btn.dataset.size);
                        document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                    });

                });

                document.getElementById("qtyMinus").addEventListener("click", () => {
                    if (qty > 1) qty--;
                    document.getElementById("qtyValue").textContent = qty;
                });

                document.getElementById("qtyPlus").addEventListener("click", () => {
                    if (qty < currentStock()) qty++;
                    document.getElementById("qtyValue").textContent = qty;
                });

                document.getElementById("addToCartBtn").addEventListener("click", () => {
                    const color = currentColor();
                    addToCart(product.id, selectedSize, qty, color ? color.name : "");
                });

                document.getElementById("orderNowBtn").addEventListener("click", () => {
                    const color = currentColor();
                    addToCart(product.id, selectedSize, qty, color ? color.name : "");
                    openContactModal();
                });

            }

            render();
            initReviews(product.id);

            let selectedRating = 0;

            function starIcon(filled) {
                return filled ? "fa-solid fa-star" : "fa-regular fa-star";
            }

            function renderStarsHtml(rating) {

                let html = "";

                for (let i = 1; i <= 5; i++) {
                    html += `<i class="${starIcon(i <= Math.round(rating))}"></i>`;
                }

                return html;

            }

            async function initReviews(productId) {

                const section = document.getElementById("reviewsSection");
                section.style.display = "block";

                await refreshReviews(productId);

                const reviewedList = JSON.parse(localStorage.getItem("ub_reviewed_products")) || [];
                const alreadyReviewed = reviewedList.includes(Number(productId));

                const formBox = document.querySelector(".review-form-box");

                if (alreadyReviewed) {

                    formBox.innerHTML = `
                        <p style="color:var(--gray);">
                            ✅ Siz bu mahsulotga allaqachon sharh qoldirgansiz. Rahmat!
                        </p>
                    `;

                    return;

                }

                const starPicker = document.getElementById("starPicker");

                starPicker.querySelectorAll("i").forEach(star => {

                    star.addEventListener("click", () => {

                        selectedRating = Number(star.dataset.value);

                        starPicker.querySelectorAll("i").forEach(s => {
                            const val = Number(s.dataset.value);
                            s.className = val <= selectedRating ? "fa-solid fa-star" : "fa-regular fa-star";
                        });

                    });

                });

                document.getElementById("reviewForm").addEventListener("submit", async (e) => {

                    e.preventDefault();

                    const msg = document.getElementById("reviewMsg");
                    msg.className = "settings-msg";

                    if (!selectedRating) {
                        msg.textContent = "Iltimos, yulduzcha orqali baho bering";
                        msg.classList.add("error");
                        return;
                    }

                    const name = document.getElementById("rv_name").value.trim();
                    const comment = document.getElementById("rv_comment").value.trim();

                    const ok = await addReview(productId, name, selectedRating, comment);

                    if (!ok) {
                        msg.textContent = "Xatolik yuz berdi, qayta urinib ko'ring";
                        msg.classList.add("error");
                        return;
                    }

                    const updatedList = JSON.parse(localStorage.getItem("ub_reviewed_products")) || [];
                    updatedList.push(Number(productId));
                    localStorage.setItem("ub_reviewed_products", JSON.stringify(updatedList));

                    await refreshReviews(productId);

                    formBox.innerHTML = `
                        <p style="color:var(--gray);">
                            ✅ Rahmat! Sharhingiz qo'shildi.
                        </p>
                    `;

                });

            }

            async function refreshReviews(productId) {

                const reviews = await getReviews(productId);

                const avg = reviews.length
                    ? reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length
                    : 0;

                document.getElementById("ratingAverage").textContent = avg.toFixed(1);
                document.getElementById("ratingStars").innerHTML = renderStarsHtml(avg);
                document.getElementById("ratingCount").textContent = reviews.length + " ta sharh";

                const list = document.getElementById("reviewsList");

                list.innerHTML = reviews.length
                    ? reviews.map(r => `
                        <div class="review-item">
                            <div class="review-item-head">
                                <strong>${r.name}</strong>
                                <span class="review-stars">${renderStarsHtml(r.rating)}</span>
                            </div>
                            <p>${r.comment || ""}</p>
                            <span class="review-date">${new Date(r.created_at).toLocaleDateString("uz-UZ")}</span>
                        </div>
                    `).join("")
                    : `<p class="empty-note">Hozircha sharh yo'q. Birinchi bo'lib fikringizni qoldiring!</p>`;

            }

        });

    </script>

</body>

</html>
